{% extends 'base_dashboard.html' %}

{% block content %}
    <h2>💳 Pending EMI Payments</h2>
    
    {% if emis %}
        <table border="1" style="width: 100%; border-collapse: collapse; background: white;">
            <thead style="background: #2c3e50; color: white;">
                <tr>
                    <th style="padding: 10px;">Due Date</th>
                    <th style="padding: 10px;">Loan ID</th>
                    <th style="padding: 10px;">Amount</th>
                    <th style="padding: 10px;">Action</th>
                </tr>
            </thead>
            {% for emi in emis %}
            <tr>
                <td style="padding: 10px;">{{ emi.due_date }}</td>
                <td style="padding: 10px;">{{ emi.loan.id }}</td>
                <td style="padding: 10px; font-weight: bold;">{{ emi.amount }}</td>
                <td style="padding: 10px;">
                    <a href="{% url 'initiate_payment' emi.id %}" style="background: green; color: white; padding: 5px 10px; text-decoration: none; border-radius: 4px;">
                        Pay Now
                    </a>
                </td>
            </tr>
            {% endfor %}
        </table>
    {% else %}
        <p>You have no pending payments! 🎉</p>
    {% endif %}
{% endblock %}
