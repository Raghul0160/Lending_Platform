<!DOCTYPE html>
<html lang="en">
<head>
    <title>Set New Password</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; margin-bottom: 15px; }
        .btn { width: 100%; background-color: #28a745; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn:hover { background-color: #218838; }
        .error { color: #dc3545; font-size: 13px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Set New Password</h2>
        <p style="color: #666; font-size: 14px;">OTP sent to {{ email }}</p>

        {% if messages %}
            {% for message in messages %}
                <p class="error">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label style="float:left; font-size:14px; margin-bottom:5px;">Enter OTP</label>
            <input type="text" name="otp" placeholder="6-digit code" required>
            
            <label style="float:left; font-size:14px; margin-bottom:5px;">New Password</label>
            <input type="password" name="new_password" required>
            
            <button type="submit" class="btn">Change Password</button>
        </form>
    </div>
</body>
</html>
