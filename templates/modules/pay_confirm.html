{% extends 'base_dashboard.html' %}

{% block content %}
<div style="text-align: center; padding: 50px; background: white;">
    <h3>Confirm Payment</h3>
    <p>You are paying <strong>${{ emi.amount }}</strong> for Loan #{{ emi.loan.id }}</p>
    
    <button id="rzp-button1" style="background: blue; color: white; padding: 15px 30px; font-size: 18px; border: none; cursor: pointer;">
        Proceed to Pay
    </button>
</div>


<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
var options = {
    "key": "{{ razorpay_key }}", 
    "amount": "{{ order.amount }}", 
    "currency": "INR",
    "name": "Lending Platform",
    "description": "EMI Payment for Loan #{{ emi.loan.id }}",
    "order_id": "{{ order.id }}", 
    "handler": function (response){
       
        document.getElementById('payment_id').value = response.razorpay_payment_id;
        document.getElementById('success-form').submit();
    }
};

var rzp1 = new Razorpay(options);
document.getElementById('rzp-button1').onclick = function(e){
    rzp1.open();
    e.preventDefault();
}
</script>


<form action="{% url 'payment_success' %}" method="POST" id="success-form">
    {% csrf_token %}
    <input type="hidden" name="razorpay_payment_id" id="payment_id">
    <input type="hidden" name="emi_id" value="{{ emi.id }}">
</form>

{% endblock %}
