<!DOCTYPE html>
<html lang="en">
<head>
    <title>Forgot Password</title>
    <!-- Use the same CSS as Login -->
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; margin-bottom: 15px; }
        .btn { width: 100%; background-color: #213346; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn:hover { background-color: #223549; }
        .error { color: #dc3545; font-size: 13px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Reset Password</h2>
        <p style="color: #666; font-size: 14px;">Enter your email to receive an OTP.</p>
        
        {% if messages %}
            {% for message in messages %}
                <p class="error">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label style="float:left; font-size:14px; margin-bottom:5px;">Email Address</label>
            <input type="email" name="email" required>
            <button type="submit" class="btn">Send OTP</button>
        </form>
        <p style="margin-top: 20px; font-size: 14px;"><a href="{% url 'login' %}" style="text-decoration:none; color:#1d2d3f;">Back to Login</a></p>
    </div>
</body>
</html>
