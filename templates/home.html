<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Finance | Secure Lending</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        
        :root {
            --primary-dark: #020c1b;
            --primary-light: #0a192f;
            --accent-green: #64ffda;
            --accent-gold: #ffd700;
            --text-light: #ccd6f6;
        }

        body { 
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            
            background: radial-gradient(circle at 50% 50%, #112240 0%, #020c1b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

       
        .money-rain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1; 
            overflow: hidden;
        }

        .bill {
            position: absolute;
            top: -100px;
            width: 60px;  
            height: 30px;
            
            background-color: #85bb65; 
            border: 2px solid #5a8f3d;
            border-radius: 3px;
            
            opacity: 0.8;
            animation: fall linear infinite;
            
            box-shadow: 0 0 10px rgba(133, 187, 101, 0.4);
        }

        .bill::after {
            content: '$';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #1a3816;
            font-weight: bold;
            font-size: 16px;
            font-family: 'Playfair Display', serif;
        }

        @keyframes fall {
            0% {
                top: -10%;
                transform: translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            100% {
                top: 110%;
                transform: translateX(20px) rotate(360deg);
                opacity: 0;
            }
        }

        .bill:nth-child(1) { left: 10%; animation-duration: 5s; animation-delay: 0s; }
        .bill:nth-child(2) { left: 20%; animation-duration: 7s; animation-delay: 2s; background-color: #aadd88; }
        .bill:nth-child(3) { left: 30%; animation-duration: 4s; animation-delay: 4s; }
        .bill:nth-child(4) { left: 50%; animation-duration: 6s; animation-delay: 0s; background-color: #aadd88; }
        .bill:nth-child(5) { left: 65%; animation-duration: 8s; animation-delay: 3s; }
        .bill:nth-child(6) { left: 80%; animation-duration: 5s; animation-delay: 1s; background-color: #aadd88; }
        .bill:nth-child(7) { left: 90%; animation-duration: 6s; animation-delay: 5s; }
        .bill:nth-child(8) { left: 40%; animation-duration: 9s; animation-delay: 2s; }
        .bill:nth-child(9) { left: 15%; animation-duration: 6.5s; animation-delay: 1.5s; }
        .bill:nth-child(10) { left: 75%; animation-duration: 7.5s; animation-delay: 0.5s; }

        .card {
            position: relative;
            z-index: 10;
            background: rgba(10, 25, 47, 0.75);
            width: 400px;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 
                0 20px 50px rgba(0,0,0,0.5),
                0 0 0 1px rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            text-align: center;
            border-top: 4px solid var(--accent-green);
        }

        .logo-icon {
            font-size: 40px;
            margin-bottom: 10px;
            display: inline-block;
            text-shadow: 0 0 20px rgba(100, 255, 218, 0.5);
        }

        h1 {
            color: white;
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 10px 0;
            letter-spacing: 0.5px;
        }

        p {
            color: var(--text-light);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            padding: 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: transparent;
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
        }
        
        .btn-primary:hover {
            background: rgba(100, 255, 218, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(100, 255, 218, 0.2);
        }

        .btn-secondary {
            background: var(--accent-green);
            color: var(--primary-dark);
            border: 1px solid var(--accent-green);
        }

        .btn-secondary:hover {
            background: #4cdbb3;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(100, 255, 218, 0.4);
        }

        .btn-admin {
            margin-top: 20px;
            font-size: 13px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            opacity: 0.6;
            transition: 0.3s;
        }
        .btn-admin:hover {
            opacity: 1;
            color: var(--accent-green);
        }

    </style>
</head>
<body>

    <div class="money-rain">
        <div class="bill"></div>
        <div class="bill"></div>
        <div class="bill"></div>
        <div class="bill"></div>
        <div class="bill"></div>
        <div class="bill"></div>
        <div class="bill"></div>
        <div class="bill"></div>
        <div class="bill"></div>
        <div class="bill"></div>
    </div>

    <div class="card">

        <h1>Digital Finance</h1>
        <p>Digital Finance Management Platform for Micro & Consumer Lending</p>

        <div class="btn-group">
            <a href="{% url 'login' %}" class="btn btn-secondary">Customer Login</a>
            <a href="{% url 'register' %}" class="btn btn-primary">Create New Account</a>
        </div>

        <div style="margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
            <a href="/admin/" class="btn-admin">Authorized Staff Access</a>
        </div>
    </div>

</body>
</html>
